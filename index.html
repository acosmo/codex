<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<base href="/">
<title>СИНАЙСКИЙ КОДЕКС</title>

<link rel="stylesheet" href="lib/style.css">
</head>

<body>

<div class="box">

  <div class="logo">СИНАЙСКИЙ КОДЕКС</div>

  <!-- BOOK NAV -->
  <div class="nav" id="bookNav"></div>

  <!-- PAGE NAV -->
  <div class="nav" id="pageNav"></div>

  <!-- AUDIO BAR -->
  <div id="audioBar" class="audio-bar" style="display:none">
    <button id="audioPlayBtn" class="audio-play-btn" aria-label="Play">&#9654;</button>
    <div class="audio-progress-wrap">
      <div class="audio-meta">
        <span id="audioLabel"></span>
        <span id="audioTime">0:00 / 0:00</span>
      </div>
      <div class="audio-track" id="audioTrack">
        <div class="audio-fill" id="audioFill"></div>
        <div class="audio-thumb" id="audioThumb"></div>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content">Loading...</div>

</div>

<script type="module" src="./lib/main.js"></script>

</body>
</html>
