<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Reader</title>

<style>
  body {
    margin: 0;
    font-family: Georgia, serif;
    background: #0f0f0f;
    color: #eaeaea;
    display: flex;
    justify-content: center;
    padding: 30px;
  }

  .box {
    width: 800px;
    background: #1a1a1a;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }

  .logo {
    text-align: center;
    margin-bottom: 20px;
    font-size: 90px;
    font-weight: bold;
    letter-spacing: 3px;
  }

  .nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 15px 0;
  }

  .nav button {
    background: #333;
    color: white;
    border: none;
    font-size: 40px;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
  }

  .nav button:hover {
    background: #555;
  }

  .line {
    display: block;
    margin: 12px 0;
    padding: 12px 14px;
    background: #222;
    border-left: 4px solid #555;
    border-radius: 6px;
    font-size: 45px;
    line-height: 1.8;
  }
</style>
</head>

<body>

<div class="box">

  <!-- TITLE -->
  <div class="logo">СИНАЙСКИЙ КОДЕКС</div>

  <!-- TOP NAV -->
  <div class="nav" id="topNav"></div>

  <!-- TEXT -->
  <div id="content">Loading...</div>

  <!-- BOTTOM NAV -->
  <div class="nav" id="bottomNav"></div>

</div>

<script>
let page = 1;
let maxPages = 21; // change this if you have more files

// build navigation buttons
function buildNav() {
  const top = document.getElementById("topNav");
  const bottom = document.getElementById("bottomNav");

  let html = "";
  for (let i = 1; i <= maxPages; i++) {
    html += `<button onclick="goPage(${i})">${i}</button>`;
  }

  top.innerHTML = html;
  bottom.innerHTML = html;
}

// load page content
function loadPage() {
  fetch(page + ".html")
    .then(res => {
      if (!res.ok) throw new Error("File not found");
      return res.text();
    })
    .then(text => {
      const lines = text
        .split("\n")
        .map(l => l.trim())
        .filter(Boolean);

      document.getElementById("content").innerHTML =
        lines.map(l => `<div class="line">${l}</div>`).join("");
    })
    .catch(() => {
      document.getElementById("content").innerHTML =
        "❌ Page not found: " + page + ".html";
    });
}

// jump to page
function goPage(n) {
  page = n;
  loadPage();
}

buildNav();
loadPage();
</script>

</body>
</html>
